<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAssets</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/x-icon" href="assets/icons/school.ico">
</head>

<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand-section">
                <div class="brand-title">EduAssets</div>
                <div class="brand-subtitle">Controle de Equipamentos</div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <span class="nav-section-title">Diário</span>
                    <ul class="nav-menu">
                        <li><a href="#" class="nav-link active">Novo empréstimo</a></li>
                        <li><a href="#" class="nav-link">Devoluções</a></li>
                    </ul>
                </div>

                <div class="nav-section">
                    <span class="nav-section-title">Gestão</span>
                    <ul class="nav-menu">
                        <li><a href="#" class="nav-link">Dashboard</a></li>
                        <li><a href="#" class="nav-link">Exportar</a></li>
                    </ul>
                </div>

                <div class="nav-section">
                    <span class="nav-section-title">Sistema</span>
                    <ul class="nav-menu">
                        <li><a href="#" class="nav-link">Configurações</a></li>
                        <li><a href="#" class="nav-link">Sobre</a></li>
                    </ul>
                </div>
            </nav>

            <div class="sidebar-footer">
                v0.1 · EduAssets | Thiago da Silva
            </div>
        </aside>

        <main class="main-content">
            <div class="emprestimo-container">
                <div class="conteudo-container">
                    <h2>Novo Empréstimo</h2>
                    <form>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="aluno">Solicitante</label>
                                <input list="solicitante" id="solicitante" name="solicitante" required>
                                <datalist id="solicitante">
                                    <option value="aluno1">Aluno 1</option>
                                    <option value="aluno2">Aluno 2</option>
                                </datalist>
                            </div>
                            <div class="form-group">
                                <label for="responsavel">Responsável</label>
                                <select name="responsavel" id="responsavel" required>
                                    <option value="" disabled selected hidden>Responsável por empréstimo</option>
                                    <option value="resp1">Thiago da Silva</option>
                                    <option value="resp2">Prof. Maria</option>
                                    <option value="resp3">Prof. João</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="equipamento">Equipamento</label>
                                <select name="equipamento" id="equipamento" required>
                                    <option value="" disabled selected hidden>Selecionar equipamento</option>
                                    <option value="eq1">Notebook</option>
                                    <option value="eq2">Tablet</option>
                                    <option value="eq3">Fone de ouvido</option>
                                    <option value="eq4">Fonte de carregamento</option>
                                    <option value="eq5">Carregador USB</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="quantidade">Quantidade</label>
                                <input type="number" id="quantidade" name="quantidade" min="1" value="1" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="data-emprestimo">Data</label>
                                <input type="date" id="data-emprestimo" name="data-emprestimo" required>
                            </div>
                        </div>
                        <button class="registrar-emprestimo" type="submit">Registrar Empréstimo</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

</body>

</html>
